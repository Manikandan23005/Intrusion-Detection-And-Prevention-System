{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Create Account</h2>
        <form method="POST" action="/register" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input type="text" name="username"
                    class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                    required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" name="password"
                    class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-emerald-500"
                    required>
            </div>
            <button type="submit"
                class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 rounded-lg font-bold shadow-lg transition">Register</button>
        </form>
        <p class="mt-6 text-center text-slate-400 text-sm">Already have an account? <a href="/login"
                class="text-emerald-400 hover:underline">Log in</a></p>
    </div>
</div>
{% endblock %}
